services:
  estop_robot:
    build:
      context: ../..
      dockerfile: robot_service/docker/Dockerfile
    image: go2w_estop_robot:humble
    container_name: go2w_estop_robot
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - >-
        CYCLONEDDS_URI=<CycloneDDS><Domain><General><Interfaces><NetworkInterface name="wlan0" priority="default" multicast="default" /><NetworkInterface name="eth0" priority="default" multicast="default" /></Interfaces></General></Domain></CycloneDDS>
    restart: unless-stopped
    stdin_open: true
    tty: true
